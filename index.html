<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0d0f12">
  <title>Lec-Flix Genèric</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="styles.css?v=12">
</head>
<body>
  <header>
    <h1>Lec-Flix</h1>
    <p>Generador Multi-Ritme</p>
  </header>

  <main>
    <!-- PANTALLA 1: MENÚ PRINCIPAL -->
    <section id="menu">
      <input id="input-titol" type="text" placeholder="Títol del llibre..."
             onchange="seleccio.titol = this.value">

      <div class="tabs-container">
        <div class="tab-btn" onclick="openScreen('genere')">
          GÈNERE <span id="genere-label">▼</span>
        </div>
        <div class="tab-btn" onclick="openScreen('estructura')">
          ESTRUCTURA <span id="estructura-label">▼</span>
        </div>
        <div class="tab-btn" onclick="openScreen('ritme')">
          RITME <span id="ritme-label">Novel·la 60k</span>
        </div>
        <div class="tab-btn" onclick="openScreen('pov')">
          POV <span id="pov-label">▼</span>
        </div>
      </div>

      <div class="botons">
        <button id="btn-preview">Preview</button>
        <button id="btn-generar">Generar Text</button>
        <button id="btn-exportar">Exportar.txt</button>
      </div>

      <section id="resultat">
        <p style="color: var(--text-muted); text-align: center;">
          Selecciona Gènere + Ritme + Estructura per començar
        </p>
      </section>
    </section>

    <!-- PANTALLES SELECCIÓ... igual que abans -->

    <!-- PANTALLA 3: LECTURA -->
    <section id="screen-lectura" class="screen">
      <div class="screen-header">
        <button onclick="closeScreen('menu')">← Menú</button>
        <h2>LECTURA</h2>
        <button id="btn-toc-toggle">Índex</button>
      </div>

      <div id="toc-container" class="toc-hidden">
        <div id="toc-content"></div>
      </div>

      <div class="screen-content" id="lectura-content"></div>

      <div class="lectura-nav">
        <button id="btn-prev-seccio">← Anterior</button>
        <button id="btn-next-seccio">Següent →</button>
      </div>
    </section>
  </main>

  <script type="module">
  const baseURL = new URL('.', import.meta.url).href;

  let BANCS = {};
  let llibreGenerat = null;
  let currentCapIdx = 0;
  let currentEscIdx = 0;
  let flatScenes = [];

  try {
    const mod = await import(baseURL + 'data/loaderjson.js');
    BANCS = await mod.loadAllBancs();
  } catch (e) {
    console.warn('No s\'han carregat bancs, usando fallback', e);
    BANCS = {
      banco_estructura: {'Save the Cat': Array(17).fill('Beat')},
      banco_lectura: [
        {tipus:'obertura', text:'{p0} va obrir els ulls.'},
        {tipus:'accio', text:'{p0} va córrer.'},
        {tipus:'dialog', text:'"Hola", va dir {p0}.'},
        {tipus:'descripcio', text:'Plovia.'},
        {tipus:'cliffhanger', text:'Però llavors...'},
        {tipus:'tancament', text:'Fi.'}
      ],
      banco_personatge: [{nom:'Àlex'},{nom:'Marta'},{nom:'Oriol'}],
      banco_ubicacion: [{ciutat:'Barcelona'}]
    };
  }

  window.seleccio = {
    titol: '',
    genere: 'policiac',
    estructura: 'Save the Cat',
    ritme: 'Novel·la',
    pov: '1 Protagonista'
  };

  window.openScreen = function(screenName) {
    document.getElementById('menu').style.display = 'none';
    document.getElementById('resultat').style.display = 'none';
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    const screen = document.getElementById('screen-' + screenName);
    if (screen) screen.classList.add('active');
  };

  window.closeScreen = function() {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById('menu').style.display = 'block';
    document.getElementById('resultat').style.display = 'block';
  };

  window.selectGenere = g => {
    seleccio.genere = g;
    document.getElementById('genere-label').textContent = g.toUpperCase();
    closeScreen();
  };
  window.selectEstructura = e => {
    seleccio.estructura = e;
    document.getElementById('estructura-label').textContent = e;
    closeScreen();
  };
  window.selectRitme = r => {
    seleccio.ritme = r;
    document.getElementById('ritme-label').textContent = r;
    closeScreen();
  };
  window.selectPov = p => {
    seleccio.pov = p;
    document.getElementById('pov-label').textContent = p;
    closeScreen();
  };

  document.getElementById('btn-generar').onclick = async () => {
    document.getElementById('resultat').innerHTML = `<p style="text-align:center">Generant ${seleccio.ritme}...</p>`;
    try {
      const mod = await import(baseURL + 'main.js');
      llibreGenerat = await mod.generarLlibre(seleccio, BANCS);
      mostrarLlibre(llibreGenerat);
    } catch (err) {
      console.error(err);
      document.getElementById('resultat').innerHTML =
        `<p style="color:red;text-align:center">Error: ${err.message}</p>`;
    }
  };

  document.getElementById('btn-preview').onclick = () => {
    if (!llibreGenerat) return alert('Primer prem Generar Text');
    mostrarLlibre(llibreGenerat);
  };

  document.getElementById('btn-exportar').onclick = () => {
    if (!llibreGenerat) return alert('Primer prem Generar Text');
    const text = llibreGenerat.capitols.map(c =>
      `CAPÍTOL ${c.num}\n\n` + c.escenes.map(e => `${e.titol}\n${e.text}\n\n`).join('')
    ).join('\n---\n\n');
    const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = (seleccio.titol || 'text') + '.txt';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  };

  function mostrarLlibre(llibre) {
    // Aplanar escenes per navegació
    flatScenes = [];
    llibre.capitols.forEach((cap, capIdx) => {
      cap.escenes.forEach((esc, escIdx) => {
        flatScenes.push({capIdx, escIdx, cap, esc});
      });
    });
    currentCapIdx = 0;
    currentEscIdx = 0;

    construirTOC(llibre);
    renderEscenaActual();

    document.getElementById('resultat').innerHTML =
      `<p style="text-align:center;color:var(--accent)">Generat: ${llibre.metadata.paraulesAprox} paraules - ${llibre.metadata.nCapitols} capítols</p>`;

    document.getElementById('menu').style.display = 'none';
    document.getElementById('screen-lectura').classList.add('active');
  }

  function construirTOC(llibre) {
    const toc = document.getElementById('toc-content');
    toc.innerHTML = '';

    llibre.capitols.forEach((cap, capIdx) => {
      const capDiv = document.createElement('div');
      capDiv.className = 'toc-acte';
      capDiv.textContent = `Capítol ${cap.num} - ${cap.beat}`;
      capDiv.onclick = () => saltarA(capIdx, 0);
      toc.appendChild(capDiv);

      cap.escenes.forEach((esc, escIdx) => {
        if (esc.titol) {
          const escDiv = document.createElement('div');
          escDiv.className = 'toc-escena';
          escDiv.textContent = esc.titol;
          escDiv.onclick = () => saltarA(capIdx, escIdx);
          toc.appendChild(escDiv);
        }
      });
    });
  }

  function saltarA(capIdx, escIdx) {
    currentCapIdx = capIdx;
    currentEscIdx = escIdx;
    renderEscenaActual();
    document.getElementById('toc-container').classList.add('toc-hidden');
  }

  function renderEscenaActual() {
    const idx = flatScenes.findIndex(s => s.capIdx === currentCapIdx && s.escIdx === currentEscIdx);
    if (idx === -1) return;

    const {cap, esc} = flatScenes[idx];
    const div = document.getElementById('lectura-content');
    div.innerHTML = `<h3>Capítol ${cap.num} - ${esc.titol || 'Tancament'}</h3><p>${esc.text}</p>`;

    document.getElementById('btn-prev-seccio').disabled = idx === 0;
    document.getElementById('btn-next-seccio').disabled = idx === flatScenes.length - 1;
  }

  document.getElementById('btn-prev-seccio').onclick = () => {
    if (currentEscIdx > 0) {
      currentEscIdx--;
    } else if (currentCapIdx > 0) {
      currentCapIdx--;
      currentEscIdx = llibreGenerat.capitols[currentCapIdx].escenes.length - 1;
    }
    renderEscenaActual();
  };

  document.getElementById('btn-next-seccio').onclick = () => {
    const cap = llibreGenerat.capitols[currentCapIdx];
    if (currentEscIdx < cap.escenes.length - 1) {
      currentEscIdx++;
    } else if (currentCapIdx < llibreGenerat.capitols.length - 1) {
      currentCapIdx++;
      currentEscIdx = 0;
    }
    renderEscenaActual();
  };

  document.getElementById('btn-toc-toggle').onclick = () => {
    document.getElementById('toc-container').classList.toggle('toc-hidden');
  };
  </script>
</body>
</html>

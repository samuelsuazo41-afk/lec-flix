<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0d0f12">
  <title>Lec-Flix Genèric</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="styles.css?v=7">
</head>
<body>
  <header>
    <h1>Lec-Flix</h1>
    <p>Generador Novel·la 60k</p>
  </header>

  <main>
    <!-- MENÚ PRINCIPAL -->
    <section id="menu">
      <input id="input-titol" type="text" placeholder="Títol del llibre..."
             onchange="seleccio.titol = this.value"
             style="width:90%; max-width:400px; padding:10px; margin:12px auto; display:block;
                    background:var(--bg-dark); color:var(--text); border:1px solid var(--border);
                    border-radius:6px; text-align:center; font-size:15px;">

      <div class="tabs-container">
        <div class="tab-btn" onclick="openScreen('genere')">GÈNERE <span>▼</span></div>
        <div class="tab-btn" onclick="openScreen('estructura')">ESTRUCTURA <span>▼</span></div>
        <div class="tab-btn" onclick="openScreen('ritme')">RITME <span>▼</span></div>
        <div class="tab-btn" onclick="openScreen('pov')">POV <span>▼</span></div>
      </div>

      <div class="botons">
        <button id="btn-preview">Preview</button>
        <button id="btn-generar">Generar Novel·la</button>
        <button id="btn-exportar">Exportar.txt</button>
      </div>
    </section>

    <!-- ===== PANTALLAS NIVEL 2 ===== -->
    <section id="screen-genere" class="screen">
      <div class="screen-header">
        <button onclick="closeScreen()">← Tornar</button>
        <h2>GÈNERE</h2>
      </div>
      <div class="screen-content" id="genere-content"></div>
    </section>

    <section id="screen-estructura" class="screen">
      <div class="screen-header">
        <button onclick="closeScreen()">← Tornar</button>
        <h2>ESTRUCTURA</h2>
      </div>
      <div class="screen-content" id="estructura-content"></div>
    </section>

    <section id="screen-ritme" class="screen">
      <div class="screen-header">
        <button onclick="closeScreen()">← Tornar</button>
        <h2>RITME</h2>
      </div>
      <div class="screen-content" id="ritme-content"></div>
    </section>

    <section id="screen-pov" class="screen">
      <div class="screen-header">
        <button onclick="closeScreen()">← Tornar</button>
        <h2>POV</h2>
      </div>
      <div class="screen-content" id="pov-content"></div>
    </section>

    <!-- ===== PANTALLAS NIVEL 3 - GÈNERE ===== -->
    <section id="screen-genere-accio" class="screen">
      <div class="screen-header">
        <button onclick="closeScreen('screen-genere')">← Tornar</button>
        <h2>ACCIÓ</h2>
      </div>
      <div class="screen-content" id="genere-accio-content"></div>
    </section>

    <section id="screen-genere-romantic" class="screen">
      <div class="screen-header">
        <button onclick="closeScreen('screen-genere')">← Tornar</button>
        <h2>ROMÀNTIC</h2>
      </div>
      <div class="screen-content" id="genere-romantic-content"></div>
    </section>

    <section id="screen-genere-terror" class="screen">
      <div class="screen-header">
        <button onclick="closeScreen('screen-genere')">← Tornar</button>
        <h2>TERROR</h2>
      </div>
      <div class="screen-content" id="genere-terror-content"></div>
    </section>

    <section id="screen-genere-misteri" class="screen">
      <div class="screen-header">
        <button onclick="closeScreen('screen-genere')">← Tornar</button>
        <h2>MISTERI</h2>
      </div>
      <div class="screen-content" id="genere-misteri-content"></div>
    </section>

    <!-- ===== PANTALLAS NIVEL 3 - ESTRUCTURA ===== -->
    <section id="screen-estructura-3actes" class="screen">
      <div class="screen-header">
        <button onclick="closeScreen('screen-estructura')">← Tornar</button>
        <h2>3 ACTES</h2>
      </div>
      <div class="screen-content" id="estructura-3actes-content"></div>
    </section>

    <section id="screen-estructura-savecat" class="screen">
      <div class="screen-header">
        <button onclick="closeScreen('screen-estructura')">← Tornar</button>
        <h2>SAVE THE CAT</h2>
      </div>
      <div class="screen-content" id="estructura-savecat-content"></div>
    </section>

    <!-- ===== PANTALLAS NIVEL 3 - RITME ===== -->
    <section id="screen-ritme-relat" class="screen">
      <div class="screen-header">
        <button onclick="closeScreen('screen-ritme')">← Tornar</button>
        <h2>RELAT CURT</h2>
      </div>
      <div class="screen-content" id="ritme-relat-content"></div>
    </section>

    <section id="screen-ritme-novella" class="screen">
      <div class="screen-header">
        <button onclick="closeScreen('screen-ritme')">← Tornar</button>
        <h2>NOVEL·LA 60K</h2>
      </div>
      <div class="screen-content" id="ritme-novella-content"></div>
    </section>

    <section id="screen-ritme-epic" class="screen">
      <div class="screen-header">
        <button onclick="closeScreen('screen-ritme')">← Tornar</button>
        <h2>ÈPIC 100K</h2>
      </div>
      <div class="screen-content" id="ritme-epic-content"></div>
    </section>

    <!-- ===== PANTALLAS NIVEL 3 - POV ===== -->
    <section id="screen-pov-unic" class="screen">
      <div class="screen-header">
        <button onclick="closeScreen('screen-pov')">← Tornar</button>
        <h2>POV ÚNIC</h2>
      </div>
      <div class="screen-content" id="pov-unic-content"></div>
    </section>

    <section id="screen-pov-multiple" class="screen">
      <div class="screen-header">
        <button onclick="closeScreen('screen-pov')">← Tornar</button>
        <h2>POV MÚLTIPLE</h2>
      </div>
      <div class="screen-content" id="pov-multiple-content"></div>
    </section>

    <!-- ===== PANTALLA DE LECTURA ===== -->
    <section id="screen-lectura" class="screen">
      <div class="screen-header">
        <button onclick="closeScreen('menu')">← Menú</button>
        <h2>LECTURA</h2>
        <button id="btn-toc-toggle">Índex</button>
      </div>

      <div id="toc-container" class="toc-hidden">
        <div id="toc-content"></div>
      </div>

      <div class="screen-content" id="lectura-content"></div>

      <div class="lectura-nav">
        <button id="btn-prev-seccio">← Anterior</button>
        <button id="btn-next-seccio">Següent →</button>
      </div>
    </section>

    <!-- RESULTAT -->
    <section id="resultat">
      <p style="color: var(--text-muted); text-align: center;">
        Selecciona Gènere + Ritme + Estructura per començar
      </p>
    </section>
  </main>

  <script src="main.js?v=7"></script>
</body>
</html>
